# ─────────────────────────────────────────────────────────────
# ServisLog Core — GitHub Actions CI/CD Pipeline
# Phase 5 — CI/CD
#
# Trigger:
#   - Setiap push ke branch main/master
#   - Setiap Pull Request ke branch main/master
#
# Jobs:
#   1. analyze    — flutter analyze (lint & static analysis)
#   2. test       — flutter test (unit tests)
#   3. build_apk  — Build APK (hanya saat push ke main/master)
# ─────────────────────────────────────────────────────────────

name: ServisLog CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  FLUTTER_VERSION: '3.29.2'   # Update sesuai versi Flutter proyek
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Analyze (Lint & Static Analysis)
  # ─────────────────────────────────────────────────────────────
  analyze:
    name: "🔍 Flutter Analyze"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: "📦 Get dependencies"
        run: flutter pub get

      - name: "🔧 Generate code (build_runner)"
        run: dart run build_runner build --delete-conflicting-outputs

      - name: "🔍 Run Flutter Analyze"
        run: flutter analyze --no-fatal-infos
        # --no-fatal-infos: Hanya gagalkan CI jika ada error/warning, bukan info

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Test (Unit & Widget Tests)
  # ─────────────────────────────────────────────────────────────
  test:
    name: "🧪 Flutter Test"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: analyze   # Jalankan setelah analyze berhasil

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: "📦 Get dependencies"
        run: flutter pub get

      - name: "🔧 Generate code (build_runner)"
        run: dart run build_runner build --delete-conflicting-outputs

      - name: "🧪 Run Flutter Tests"
        run: flutter test --coverage

      - name: "📊 Upload Coverage Report"
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false   # Jangan gagalkan CI jika upload coverage gagal
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Build APK (hanya saat push ke main/master)
  # Tidak berjalan saat Pull Request agar menghemat build time
  # ─────────────────────────────────────────────────────────────
  build_apk:
    name: "📦 Build APK"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'push'   # Hanya saat push, bukan PR

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🎯 Setup Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: "📦 Get dependencies"
        run: flutter pub get

      - name: "🔧 Generate code (build_runner)"
        run: dart run build_runner build --delete-conflicting-outputs

      - name: "📦 Build APK (release)"
        run: flutter build apk --release --split-per-abi

      - name: "💾 Upload APK as artifact"
        uses: actions/upload-artifact@v4
        with:
          name: servislog-apk-${{ github.sha }}
          path: build/app/outputs/apk/release/*.apk
          retention-days: 14   # Simpan 14 hari
          if-no-files-found: error
